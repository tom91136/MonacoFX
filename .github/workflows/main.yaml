name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        java: [ '21', '22', '23', '24', '25', '26' ]
        javafx: [ '22.0.2', '23.0.2', '24.0.2', '25.0.2', '26' ]
        exclude:
          # JavaFX N requires JDK >= N-2
          - { java: '21', javafx: '24.0.2' }
          #
          - { java: '21', javafx: '25.0.2' }
          - { java: '22', javafx: '25.0.2' }
          #
          - { java: '21', javafx: '26' }
          - { java: '22', javafx: '26' }
          - { java: '23', javafx: '26' }
    name: ${{ matrix.os }} / JDK ${{ matrix.java }} / JavaFX ${{ matrix.javafx }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Install xvfb, JavaFX dependencies, and sbt
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libgtk-3-0 libgl1 apt-transport-https > /dev/null
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add -
          sudo apt-get update -qq && sudo apt-get install -y -qq sbt > /dev/null

      - name: Resolve dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: ./mvnw -B dependency:go-offline "-Djavafx.version=${{ matrix.javafx }}"

      - name: Build
        run: ./mvnw -B clean package -DskipTests "-Djavafx.version=${{ matrix.javafx }}"

      - name: Test (Linux)
        if: runner.os == 'Linux'
        env:
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1024x768x24 -ac &
          sleep 1
          ./mvnw -B verify "-Djavafx.version=${{ matrix.javafx }}"

      - name: Test (Windows/macOS)
        if: runner.os != 'Linux'
        env:
          TEST_SCALAR: ${{ runner.os == 'macOS' && '2' || '1' }}
        run: ./mvnw -B verify "-Djavafx.version=${{ matrix.javafx }}"

      - name: Create artifact zip (Linux/macOS)
        if: github.event_name == 'push' && !env.ACT && runner.os != 'Windows'
        shell: bash
        run: |
          prefix="monacofx-${{ matrix.os }}-jdk${{ matrix.java }}-javafx${{ matrix.javafx }}"
          mkdir -p staging
          cp js-support/target/js-support-*.jar staging/
          cp monacofx/target/monacofx-*.jar staging/
          cp monacofx-sample/target/monacofx-sample-*-jar-with-dependencies.jar staging/
          rm -f staging/*-sources.jar staging/*-javadoc.jar
          (cd staging && zip "../${prefix}.zip" *.jar)

      - name: Create artifact zip (Windows)
        if: github.event_name == 'push' && !env.ACT && runner.os == 'Windows'
        shell: pwsh
        run: |
          $prefix = "monacofx-${{ matrix.os }}-jdk${{ matrix.java }}-javafx${{ matrix.javafx }}"
          New-Item -ItemType Directory -Force staging | Out-Null
          Copy-Item js-support/target/js-support-*.jar staging/
          Copy-Item monacofx/target/monacofx-*.jar staging/
          Copy-Item monacofx-sample/target/monacofx-sample-*-jar-with-dependencies.jar staging/
          Remove-Item staging/*-sources.jar, staging/*-javadoc.jar -ErrorAction SilentlyContinue
          Compress-Archive -Path staging/*.jar -DestinationPath "$prefix.zip"

      - name: Upload artifacts
        if: github.event_name == 'push' && !env.ACT
        uses: actions/upload-artifact@v7
        with:
          name: monacofx-${{ matrix.os }}-jdk${{ matrix.java }}-javafx${{ matrix.javafx }}
          path: monacofx-*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Install sbt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apt-transport-https > /dev/null
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add -
          sudo apt-get update -qq && sudo apt-get install -y -qq sbt > /dev/null

      - name: Build sample uberjar
        run: |
          ./mvnw -B clean package -DskipTests -Djavafx.version=22.0.2
          cp monacofx-sample/target/monacofx-sample-*-jar-with-dependencies.jar \
             monacofx-sample.jar

      - name: Build sample app-image (jpackage)
        run: |
          jpackage \
            --type app-image \
            --name MonacoFX-Sample \
            --input monacofx-sample/target \
            --main-jar monacofx-sample-*-jar-with-dependencies.jar \
            --main-class net.kurobako.monacofx.sample.Main \
            --java-options '--add-exports javafx.web/com.sun.javafx.webkit=ALL-UNNAMED' \
            --dest jpackage-out
          tar -czf monacofx-sample-linux-x64.tar.gz -C jpackage-out MonacoFX-Sample

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            monacofx-sample.jar
            monacofx-sample-linux-x64.tar.gz
          generate_release_notes: true
          body: |
            ## MonacoFX ${{ steps.version.outputs.version }}

            ### Downloads

            - **`monacofx-sample.jar`** — cross-platform uberjar, run with `java --add-exports javafx.web/com.sun.javafx.webkit=ALL-UNNAMED -jar monacofx-sample.jar` (requires JDK 21+)
            - **`monacofx-sample-linux-x64.tar.gz`** — self-contained Linux app image (bundled JDK, no install needed)

            ### Maven

            ```xml
            <dependency>
                <groupId>net.kurobako</groupId>
                <artifactId>monacofx</artifactId>
                <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```

            ### sbt

            ```scala
            libraryDependencies += "net.kurobako" % "monacofx" % "${{ steps.version.outputs.version }}"
            ```
